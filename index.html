<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Роман Санько | Commercial & Premium Model</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --text: #FFFFFF; --accent: rgba(139, 0, 0, 0.35); }
        body { font-family: 'Manrope', sans-serif; background-color: var(--bg); color: var(--text); overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* Анимация появления */
        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .portfolio-section { padding: 80px 0; }
        .portfolio-header { text-align: center; margin-bottom: 50px; }
        
        /* Сетка галереи */
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .gallery-item { position: relative; background: #111; border-radius: 16px; overflow: hidden; aspect-ratio: 3/4; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
        
        /* Светлая прозрачная подпись */
        .gallery-label {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 12px; border-radius: 10px;
            text-align: center; font-family: 'Oswald'; text-transform: uppercase;
            transition: opacity 0.6s ease;
        }

        .btn-disk { display: inline-block; padding: 20px 40px; background: var(--accent); color: white; text-decoration: none; border-radius: 30px; font-family: 'Oswald'; text-transform: uppercase; letter-spacing: 1px; }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .gallery-label { opacity: 0; }
            .gallery-label.show { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="portfolio-section">
            <div class="portfolio-header reveal">
                <h2 style="font-family: 'Oswald'; font-size: 2.5rem; text-transform: uppercase;">Портфолио</h2>
                <div style="color: rgba(255,255,255,0.5); letter-spacing: 2px;">Локации и Ракурсы</div>
            </div>
            
            <div class="gallery-grid" id="gallery">
                <div class="gallery-item reveal"><img src="0002.jpeg"><div class="gallery-label">Ростовой план</div></div>
                <div class="gallery-item reveal"><img src="0181.jpg"><div class="gallery-label">Smile-тест</div></div>
                <div class="gallery-item reveal"><img src="21.jpg"><div class="gallery-label">Семейная съёмка</div></div>
                <div class="gallery-item reveal"><img src="19.jpeg"><div class="gallery-label">Работа в паре</div></div>
            </div>

            <div class="reveal" style="text-align: center; margin-top: 50px;">
                <a href="https://disk.yandex.ru/d/6d5U1MCmrh4i4w" class="btn-disk">Полное портфолио</a>
            </div>
        </section>
    </div>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const el = entry.target;
                    el.classList.add('active');
                    
                    if (window.innerWidth <= 768 && el.classList.contains('gallery-item')) {
                        setTimeout(() => {
                            el.querySelector('.gallery-label').classList.add('show');
                        }, 500);
                    }
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
